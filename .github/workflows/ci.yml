name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck-api:
    name: Typecheck API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  validate-n8n:
    name: Validate n8n Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflows (JSON + JS syntax + anti-patterns)
        run: bash scripts/validate-workflows.sh

  build-api-docker:
    name: Build API Docker
    runs-on: ubuntu-latest
    needs: [typecheck-api]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: financiamento-bot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sync-n8n:
    name: Sync to n8n
    runs-on: ubuntu-latest
    needs: [validate-n8n]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Sync workflows to n8n
        env:
          N8N_URL:     ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: bash scripts/import-workflows.sh
