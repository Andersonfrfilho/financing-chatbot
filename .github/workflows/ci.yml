name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck-api:
    name: Typecheck API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  validate-n8n:
    name: Validate n8n Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflows (JSON + JS syntax + anti-patterns)
        run: bash scripts/validate-workflows.sh

  build-api-docker:
    name: Build API Docker
    runs-on: ubuntu-latest
    needs: [typecheck-api]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: financiamento-bot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build & Smoke-test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Web image (tsc + vite build, igual ao Railway)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          load: true
          tags: financiamento-bot-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test — nginx serve em $PORT + healthcheck "/"
        run: |
          docker run -d --name web -e PORT=8080 -p 8080:8080 financiamento-bot-web:${{ github.sha }}
          ok=0
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$code" = "200" ]; then echo "OK Healthcheck ($code)"; ok=1; break; fi
            sleep 2
          done
          docker logs web || true
          docker rm -f web || true
          if [ "$ok" != "1" ]; then echo "FALHOU: frontend nao respondeu 200 em / na porta \$PORT"; exit 1; fi

  test-n8n-flow:
    name: Test n8n Flow (cenarios)
    runs-on: ubuntu-latest
    needs: [validate-n8n]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Rodar cenarios do fluxo (state machine)
        run: node scripts/test-n8n-full.mjs

  sync-n8n:
    name: Sync to n8n
    runs-on: ubuntu-latest
    needs: [validate-n8n, build-web, test-n8n-flow]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Sync workflows to n8n
        env:
          N8N_URL:     ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: bash scripts/import-workflows.sh
